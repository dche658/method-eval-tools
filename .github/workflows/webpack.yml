name: Build Excel Javascript Add-in

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Validate Office Add-in Manifest
      run: npx office-addin-manifest validate manifest.xml

    - name: Compile Production Web Assets
      run: npm run build

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: excel-addin-production-assets
        path: dist/
